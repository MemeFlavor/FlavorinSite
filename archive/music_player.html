<h1 class="music__titlebar-title"> Music </h1>
<div class="music__body">
     <section class="music__album">
          <a href="" class="music__album-link">
               <img class="music__album-cover" src="images/album covers/placeholder.avif" alt="" width="250"
                    height="250">
          </a>
          <hgroup class="music__album-info">
               <h1 class="music__album-title"><span>[Album Title]</span></h1>
               <p class="music__album-artists">[Album Artist(s)]</p>
          </hgroup>
     </section>
     <section class="music__playback">
          <input class="music__playback-progress" type="range" min="0" max="100" step="0.001">
          <div class="music__playback-timeformat">
               <time class="music__playback-time music__playback-time--current">00:00</time>
               <time class="music__playback-time music__playback-time--duration">99:99</time>
          </div>
          <div class="music__playback-controls">
